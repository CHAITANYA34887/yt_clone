<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamHub</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<!-- ===== Header ===== -->
<header class="header">
  <div class="header-left">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <a href="#home" class="logo">
      <svg viewBox="0 0 24 24" class="logo-icon"><path d="M10 8.5v7l6-3.5-6-3.5z" fill="#fff"/><rect width="24" height="24" rx="6" fill="#FF3B3B"/><path d="M10 8.5v7l6-3.5-6-3.5z" fill="#fff"/></svg>
      <span>StreamHub</span>
    </a>
  </div>
  <div class="header-center">
    <form class="search-form">
      <input type="text" placeholder="Search" class="search-input">
      <button type="submit" class="search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </form>
  </div>
  <div class="header-right">
    <button class="icon-btn" aria-label="Upload">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="icon-btn" aria-label="Notifications">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" fill="none"/></svg>
    </button>
    <div class="avatar">S</div>
  </div>
</header>
<!-- ===== Sidebar ===== -->
<aside class="sidebar" id="sidebar">
  <nav class="side-section">
    <a href="#home" class="side-link active" data-page="home"><span class="side-icon">🏠</span><span class="side-label">Home</span></a>
    <a href="#trending" class="side-link" data-page="trending"><span class="side-icon">🔥</span><span class="side-label">Trending</span></a>
    <a href="#subscriptions" class="side-link" data-page="subscriptions"><span class="side-icon">📺</span><span class="side-label">Subscriptions</span></a>
  </nav>
  <hr class="side-divider">
  <nav class="side-section">
    <a href="#library" class="side-link" data-page="library"><span class="side-icon">📚</span><span class="side-label">Library</span></a>
    <a href="#history" class="side-link" data-page="history"><span class="side-icon">🕒</span><span class="side-label">History</span></a>
    <a href="#your-videos" class="side-link" data-page="your-videos"><span class="side-icon">▶️</span><span class="side-label">Your videos</span></a>
    <a href="#watch-later" class="side-link" data-page="watch-later"><span class="side-icon">⏱️</span><span class="side-label">Watch later</span></a>
  </nav>
  <hr class="side-divider">
  <nav class="side-section">
    <p class="side-heading">Subscriptions</p>
    <a href="#channel-gamezone" class="side-link" data-page="channel-gamezone"><span class="side-icon">🎮</span><span class="side-label">GameZone</span></a>
    <a href="#channel-cookwithme" class="side-link" data-page="channel-cookwithme"><span class="side-icon">🍳</span><span class="side-label">CookWithMe</span></a>
    <a href="#channel-lofibeats" class="side-link" data-page="channel-lofibeats"><span class="side-icon">🎧</span><span class="side-label">LoFi Beats</span></a>
  </nav>
</aside>
<!-- ===== Main content ===== -->
<main class="main">
  <h2 id="pageTitle">Home</h2>

  <div class="chips" id="chips">
    <button class="chip active" data-category="all">All</button>
    <button class="chip" data-category="music">Music</button>
    <button class="chip" data-category="gaming">Gaming</button>
    <button class="chip" data-category="coding">Coding</button>
    <button class="chip" data-category="cooking">Cooking</button>
    <button class="chip" data-category="travel">Travel</button>
    <button class="chip" data-category="podcasts">Podcasts</button>
    <button class="chip" data-category="fitness">Fitness</button>
    <button class="chip" data-category="live">Live</button>
    <button class="chip" data-category="news">News</button>
  </div>

  <section class="video-grid" id="videoGrid"></section>
  <p id="emptyState" hidden>No videos to show.</p>
</main>
<script src="script.js"></script>
</body>
</html>
